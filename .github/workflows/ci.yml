name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv (with cache)
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync project
        run: uv --cache-dir .uv-cache sync --frozen

      - name: Ruff
        run: uv --cache-dir .uv-cache run ruff check

      - name: Ruff format
        run: uv --cache-dir .uv-cache run ruff format --check

      - name: mypy
        run: uv --cache-dir .uv-cache run mypy

      - name: Pytest
        run: uv --cache-dir .uv-cache run pytest
